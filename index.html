<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thoughtful Hollow</title>
<meta name="description" content="A small workshop for word puzzles and other thoughtful things.">
<script>
  (function () {
    try {
      var t = localStorage.getItem('th_theme');
      var resolved = (t === 'light' || t === 'dark')
        ? t
        : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', resolved);
    } catch (e) {}
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0;
  --fg: #1a1610;
  --fg-muted: #5a4e3a;
  --fg-faint: #8a7c63;
  --accent: #8a1c1c;
  --border: #d9cba8;
  --card-bg: #ffffff;
  --card-border: #e6dabb;
  --toggle-hover: rgba(0,0,0,0.05);
}
:root[data-theme="dark"] {
  --bg: #14110d;
  --fg: #efe7d4;
  --fg-muted: #b8a98a;
  --fg-faint: #8a7c63;
  --accent: #d4a85a;
  --border: #3a322a;
  --card-bg: #1d1813;
  --card-border: #2e2820;
  --toggle-hover: rgba(255,255,255,0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'Inter', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  transition: background 0.25s, color 0.25s;
}
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.page {
  flex: 1;
  max-width: 780px;
  width: 100%;
  margin: 0 auto;
  padding: clamp(1.25rem, 3vw, 2.5rem) clamp(1.5rem, 4vw, 3rem) clamp(3rem, 6vw, 5rem);
  display: flex;
  flex-direction: column;
}
.top {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  padding-bottom: clamp(3rem, 8vw, 6rem);
}
.hero {
  text-align: center;
  margin-bottom: clamp(3rem, 7vw, 5.5rem);
}
.wordmark {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 400;
  font-size: clamp(2.6rem, 8.5vw, 5.25rem);
  font-variation-settings: "opsz" 144;
  letter-spacing: -0.015em;
  line-height: 1.05;
  margin-bottom: clamp(0.75rem, 1.5vw, 1.25rem);
}
.tagline {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-weight: 400;
  font-size: clamp(1.05rem, 1.6vw, 1.35rem);
  color: var(--fg-muted);
  max-width: 36rem;
  margin: 0 auto;
  line-height: 1.5;
}
.shelf-label {
  font-family: 'Inter', sans-serif;
  font-size: clamp(0.7rem, 0.9vw, 0.8rem);
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--fg-faint);
  text-align: center;
  margin-bottom: clamp(1rem, 1.6vw, 1.5rem);
}
.card {
  display: block;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 6px;
  padding: clamp(1.25rem, 2.2vw, 1.8rem) clamp(1.4rem, 2.5vw, 2rem);
  text-decoration: none;
  color: inherit;
  transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
}
.card:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
  box-shadow: 0 4px 16px rgba(0,0,0,0.05);
}
.card-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: clamp(1.35rem, 2.1vw, 1.75rem);
  font-weight: 500;
  margin-bottom: 0.35rem;
}
.card-desc {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  color: var(--fg-muted);
  font-size: clamp(0.95rem, 1.4vw, 1.15rem);
  line-height: 1.5;
}
.card-arrow {
  color: var(--accent);
  margin-left: 0.3rem;
}
.footer {
  margin-top: auto;
  text-align: center;
  padding-top: 3rem;
  font-family: 'Inter', sans-serif;
  font-size: 0.72rem;
  color: var(--fg-faint);
  letter-spacing: 0.05em;
}
.footer-link {
  color: inherit;
  text-decoration: none;
  border-bottom: 1px solid currentColor;
  opacity: 0.7;
  transition: opacity 0.15s;
}
.footer-link:hover { opacity: 1; }
.theme-toggle {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 999px;
  width: 36px;
  height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--fg);
  padding: 0;
  transition: background 0.2s, border-color 0.2s;
}
.theme-toggle:hover { background: var(--toggle-hover); }
.theme-toggle .theme-icon { display: none; }
:root[data-theme="light"] .theme-icon-dark { display: block; }
:root[data-theme="dark"]  .theme-icon-light { display: block; }
</style>
</head>
<body>
<div class="page">
  <div class="top">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme" type="button">
      <svg class="theme-icon theme-icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path></svg>
      <svg class="theme-icon theme-icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>
  </div>

  <div class="hero">
    <h1 class="wordmark">Thoughtful Hollow</h1>
    <p class="tagline">A small workshop for word puzzles and other thoughtful things.</p>
  </div>

  <div class="shelf-label">— Currently —</div>
  <a class="card" href="/glossari">
    <div class="card-title">Glossari <span class="card-arrow">→</span></div>
    <div class="card-desc">A daily dictionary puzzle. Identify four headwords from clues and word segments.</div>
  </a>
  <a class="card" href="/sampler">
    <div class="card-title">Sam·pler <span class="card-arrow">→</span></div>
    <div class="card-desc">a daily quilt-block puzzle</div>
  </a>

  <div class="footer">© 2026 Thoughtful Hollow &nbsp;·&nbsp; <a class="footer-link" href="https://ko-fi.com/chrisandrewsedu" target="_blank" rel="noopener">Support on Ko-fi</a></div>
</div>

<script>
  (function () {
    var btn = document.getElementById('themeToggle');
    if (!btn) return;
    btn.addEventListener('click', function () {
      var cur = document.documentElement.getAttribute('data-theme') || 'light';
      var next = cur === 'dark' ? 'light' : 'dark';
      try { localStorage.setItem('th_theme', next); } catch (e) {}
      document.documentElement.setAttribute('data-theme', next);
    });
    // Follow OS theme changes only until the user makes an explicit choice
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
      var stored = localStorage.getItem('th_theme');
      if (stored === 'light' || stored === 'dark') return;
      document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
    });
  })();
</script>
</body>
</html>
