<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sampler — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fascinate&family=Spectral:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #ffffff;
  --paper-deep: #f7f7f5;
  --paper-shadow: #e8e8e4;
  --ink: #111111;
  --ink-soft: #444444;
  --ink-faint: #888888;
  --accent: #c01818;
  --accent-bright: #d83030;
  --border: #d8d8d4;
}
:root[data-theme="dark"] {
  --paper: #111111;
  --paper-deep: #181818;
  --paper-shadow: #222222;
  --ink: #f0f0ee;
  --ink-soft: #c0c0bc;
  --ink-faint: #787878;
  --accent: #e04040;
  --accent-bright: #ee6060;
  --border: #2c2c2c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--paper); color: var(--ink); font-family: 'Spectral', serif; }
.app { max-width: 1280px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 0.4rem; }
h1 { font-family: 'Fascinate', serif; font-weight: 400; font-size: 1.6rem; color: var(--accent); }
.subtitle { color: var(--ink-faint); font-size: 0.9rem; }

.hint {
  color: var(--ink-soft); font-size: 0.9rem; margin-bottom: 2rem;
  padding: 0.6rem 0.85rem; background: var(--paper-deep);
  border-left: 3px solid var(--accent); border-radius: 2px;
}

section { margin-bottom: 2.4rem; }
section h2 {
  font-family: 'Spectral', serif; font-weight: 600; font-size: 1.05rem;
  letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 0.85rem; padding-bottom: 0.35rem;
  border-bottom: 1px solid var(--border);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1.25rem;
}

.card {
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--paper-deep); padding: 0.85rem;
  display: flex; flex-direction: column; gap: 0.6rem;
}
.card-frame {
  aspect-ratio: 1 / 1; width: 100%;
  border-radius: 4px; overflow: hidden;
  background: var(--paper);
  border: 1px solid var(--border);
}
.card-frame iframe { width: 100%; height: 100%; border: none; display: block; }

.card-meta { display: flex; flex-direction: column; gap: 0.2rem; }
.card-name { font-weight: 600; font-size: 1.02rem; color: var(--ink); }
.card-id { color: var(--ink-faint); font-size: 0.75rem; font-family: ui-monospace, Menlo, monospace; }
.card-stats { color: var(--ink-soft); font-size: 0.8rem; }

.card-actions { display: flex; gap: 0.5rem; margin-top: 0.2rem; }
.play-btn, .open-btn {
  flex: 1; text-align: center; padding: 0.5rem 0.75rem;
  border-radius: 4px; font-family: 'Spectral', serif; font-size: 0.9rem;
  text-decoration: none; cursor: pointer; border: 1px solid transparent;
  transition: background 0.12s ease;
}
.play-btn {
  background: var(--accent); color: var(--paper);
}
.play-btn:hover { background: var(--accent-bright); }
.open-btn {
  background: transparent; color: var(--ink-soft); border-color: var(--border);
}
.open-btn:hover { background: var(--paper-shadow); }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>Sampler</h1>
    <span class="subtitle">Admin — all puzzles</span>
  </header>
  <div class="hint">
    Each card previews one valid solution (today's palette seed). <b>Play</b> launches the puzzle blank for real play; <b>Reveal</b> opens the solved preview full-screen.
  </div>

  <section>
    <h2>Monday — Nine-Patch</h2>
    <div class="grid" data-day="1"></div>
  </section>

  <section>
    <h2>Tuesday — Rail Fence</h2>
    <div class="grid" data-day="2"></div>
  </section>

  <section>
    <h2>Wednesday — Log Cabin</h2>
    <div class="grid" data-day="3"></div>
  </section>
</div>

<script>
// Hand-maintained registry — keep in sync with TEMPLATES in sampler.html.
// Auto-discovery via a hidden iframe is possible but adds a load step;
// since templates are added rarely, a manual list is fine and lets each
// row carry author-friendly names ("Hearth") that the source IDs don't.
const REGISTRY = [
  { day: 1, block: 'Nine-Patch', id: 'nine-patch-greek-cross-v1', name: 'Greek Cross',           solutions: '1' },
  { day: 1, block: 'Nine-Patch', id: 'nine-patch-diagonal-v1',    name: 'Cross with Edges',      solutions: '2' },
  { day: 1, block: 'Nine-Patch', id: 'nine-patch-warm-cool-v2',   name: 'Warm Corners, Dark Edges', solutions: '4' },

  { day: 2, block: 'Rail Fence', id: 'rail-fence-three-rails-v2',   name: 'Three Rails (Warm / Cool)', solutions: '6' },
  { day: 2, block: 'Rail Fence', id: 'rail-fence-center-stripe-v2', name: 'One-Frame Center',          solutions: '3' },
  { day: 2, block: 'Rail Fence', id: 'rail-fence-gradient-v1',      name: 'Light → Medium → Dark',     solutions: '6' },

  { day: 3, block: 'Log Cabin',  id: 'log-cabin-hearth-v1',     name: 'Hearth',                 solutions: '6' },
  { day: 3, block: 'Log Cabin',  id: 'log-cabin-light-dark-v1', name: 'Light/Dark Diagonal',    solutions: '6' },
  { day: 3, block: 'Log Cabin',  id: 'log-cabin-cross-v1',      name: 'Cross',                  solutions: '6' },
];

function cardFor(t) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-frame">
      <iframe src="sampler.html?template=${t.id}&preview=1" loading="lazy" title="${t.name} preview"></iframe>
    </div>
    <div class="card-meta">
      <div class="card-name">${t.name}</div>
      <div class="card-id">${t.id}</div>
      <div class="card-stats">${t.solutions} solution${t.solutions === '1' ? '' : 's'}</div>
    </div>
    <div class="card-actions">
      <a class="play-btn" href="sampler.html?template=${t.id}" target="_blank" rel="noopener">Play</a>
      <a class="open-btn" href="sampler.html?template=${t.id}&preview=1" target="_blank" rel="noopener">Reveal</a>
    </div>
  `;
  return card;
}

for (const grid of document.querySelectorAll('.grid')) {
  const day = Number(grid.dataset.day);
  REGISTRY.filter(t => t.day === day).forEach(t => grid.appendChild(cardFor(t)));
}

// Respect system theme preference (no toggle UI on this page — it's
// dev-only and inherits the main game's stored theme is overkill here).
if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
  document.documentElement.setAttribute('data-theme', 'dark');
}
</script>

</body>
</html>
