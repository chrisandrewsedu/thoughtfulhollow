<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sampler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fascinate&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:#faf6ec; --paper-deep:#f0e9d6; --ink:#2a2520; --ink-soft:#6a6258;
    --accent:#c01818; --green:#3a5a3a; --gold:#8a6c18;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:var(--paper); color:var(--ink); font-family:'Spectral',Georgia,serif;
    -webkit-tap-highlight-color:transparent; padding:1.2rem 1rem 3rem;
    max-width:780px; margin:0 auto;
  }
  h1 { font-family:'Fascinate',serif; font-weight:400; font-size:2rem; line-height:1; }
  .tag { font-size:0.8rem; color:var(--ink-soft); margin:0.2rem 0 0.9rem; }
  .stage { display:flex; flex-wrap:wrap; gap:1.4rem; align-items:flex-start; }
  #board { flex-shrink:0; }
  .side { display:flex; flex-direction:column; gap:0.4rem; min-width:230px; }
  .side-label { font-size:0.7rem; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--ink-soft); margin-top:0.35rem; }
  .kit { display:flex; flex-wrap:wrap; gap:0.34rem; }
  .kititem { display:flex; align-items:center; gap:0.5rem; padding:0.28rem 0.42rem;
    border:1.5px solid var(--ink-soft); border-radius:5px; cursor:pointer; }
  .kititem:hover { background:var(--paper-deep); }
  .kititem.sel { border-color:var(--accent); box-shadow:0 0 0 1.5px var(--accent); }
  .kititem.out { opacity:0.4; }
  .kit-name { font-size:0.83rem; }
  .kit-count { font-size:0.85rem; font-weight:600; }
  .rules { list-style:none; margin-bottom:1rem; }
  .rule-head { font-size:0.68rem; letter-spacing:0.09em; text-transform:uppercase;
    color:var(--ink-soft); margin:0.4rem 0 0.1rem; }
  .rules li { padding:0.22rem 0; font-size:0.89rem; display:flex; gap:0.5rem; align-items:baseline; }
  .rules .mark { font-weight:600; width:1.1rem; flex-shrink:0; }
  .controls { display:flex; gap:0.5rem; margin-top:0.8rem; flex-wrap:wrap; }
  button { font-family:'Spectral',serif; font-size:0.82rem; padding:0.38rem 0.8rem;
    border:1.5px solid var(--ink); background:var(--paper); color:var(--ink);
    border-radius:5px; cursor:pointer; }
  button:hover { background:var(--ink); color:var(--paper); }
  label.assist { font-size:0.82rem; display:flex; align-items:center; gap:0.35rem; margin-top:0.6rem; }
  .win { position:fixed; inset:0; background:rgba(42,37,32,0.93); color:var(--paper);
    display:none; align-items:center; justify-content:center; flex-direction:column;
    gap:0.6rem; text-align:center; padding:2rem; z-index:10; }
  .win.show { display:flex; }
  .win h2 { font-family:'Fascinate',serif; font-weight:400; font-size:2.2rem; }
  .win button { background:var(--paper); margin-top:0.5rem; }
</style>
</head>
<body>

<h1>Sampler</h1>
<div class="tag">Piece it, print it &mdash; one block, two kinds of rule.</div>

<ul class="rules" id="rulesPanel"></ul>

<div class="stage">
  <svg id="board" width="344" height="344" viewBox="0 0 344 344"></svg>
  <div class="side">
    <div class="side-label">Shapes</div>
    <div class="kit" id="kitShapes"></div>
    <div class="side-label">Fabrics</div>
    <div class="kit" id="kitFabrics"></div>
    <div class="kit" id="kitTools" style="margin-top:0.3rem"></div>
    <label class="assist"><input type="checkbox" id="assistToggle"> Assist (show rule status)</label>
    <div class="controls">
      <button id="resetBtn">Reset</button>
    </div>
  </div>
</div>

<div class="win" id="winOverlay">
  <h2>All of a piece.</h2>
  <p>Every rule met &mdash; structure and colour together.</p>
  <button onclick="document.getElementById('winOverlay').classList.remove('show')">Look again</button>
</div>

<script src="sampler-next.engine.js"></script>
<script src="sampler-next.puzzle.js"></script>
<script>
'use strict';

// ── state ────────────────────────────────────────────────────────
const CELL = 82, PAD = 8;
let grid, colors, shapeKit, selKind = null, sel = null, assist = false;

function ckey(i, part) { return i + ':' + part; }

function reset() {
  grid = new Array(NCELL).fill(null);
  colors = {};
  shapeKit = Object.assign({}, PUZZLE.kit);
  for (const i of PUZZLE.givens) {
    const s = PUZZLE.solution[i];
    grid[i] = { shape: s.shape, rot: s.rot };
    shapeKit[s.shape]--;
    for (const part in s.col) colors[ckey(i, part)] = s.col[part];
  }
  selKind = null; sel = null;
  render();
}

// ── piece geometry (SVG) ─────────────────────────────────────────
// region shapes within an S×S cell; `rot` true means the caller wraps
// the element in a rotate() transform.
function regionShapes(shape) {
  const S = CELL;
  if (shape === 'square') return [{ part: 'W', tag: 'rect', attr: `width="${S}" height="${S}"`, rot: false }];
  if (shape === 'triangle') return [
    { part: 'A', tag: 'polygon', attr: `points="0,0 ${S},0 ${S},${S}"`, rot: true },
    { part: 'B', tag: 'polygon', attr: `points="0,0 0,${S} ${S},${S}"`, rot: true },
  ];
  return [  // curve: field B is the whole cell; disc A sits on top
    { part: 'B', tag: 'rect', attr: `width="${S}" height="${S}"`, rot: false },
    { part: 'A', tag: 'path', attr: `d="M ${S/2},0 A ${S/2},${S/2} 0 0,1 0,${S/2} L 0,0 Z"`, rot: true },
  ];
}

// ── render ───────────────────────────────────────────────────────
function render() {
  const isGiven = i => PUZZLE.givens.includes(i);
  const results = assist ? evaluateAll({ grid, colors }, PUZZLE.ruleKeys) : null;
  const bad = new Set();
  if (results) for (const r of results) for (const v of r.violations) bad.add(v);

  const svg = [];
  svg.push(`<rect x="${PAD}" y="${PAD}" width="${GRID*CELL}" height="${GRID*CELL}" fill="#efe6cf"/>`);
  for (let i = 0; i < NCELL; i++) {
    const x = PAD + (i % GRID) * CELL, y = PAD + Math.floor(i / GRID) * CELL;
    const cell = grid[i];
    svg.push(`<g transform="translate(${x},${y})">`);
    if (!cell) {
      svg.push(`<rect class="hitE" data-i="${i}" width="${CELL}" height="${CELL}"
        fill="#f3ecd8" stroke="#cdc1a0" stroke-width="1" stroke-dasharray="4 3"/>`);
    } else {
      for (const rg of regionShapes(cell.shape)) {
        const fab = colors[ckey(i, rg.part)];
        const fill = fab ? FABRICS[fab].col : '#e7ddc4';
        const o = rg.rot ? `<g transform="rotate(${cell.rot*90} ${CELL/2} ${CELL/2})">` : '';
        const c = rg.rot ? '</g>' : '';
        svg.push(`${o}<${rg.tag} class="hitR" data-i="${i}" data-part="${rg.part}" ${rg.attr}`
          + ` fill="${fill}" stroke="#b3a585" stroke-width="1.1"/>${c}`);
      }
    }
    const border = (assist && bad.has(i)) ? 'var(--accent)' : '#9c8f6e';
    const bw = (assist && bad.has(i)) ? 3 : 1.4;
    svg.push(`<rect width="${CELL}" height="${CELL}" fill="none" pointer-events="none"
      stroke="${border}" stroke-width="${bw}"/>`);
    if (isGiven(i)) svg.push(`<circle cx="${CELL-9}" cy="9" r="3.3" fill="var(--gold)"
      stroke="#2a2520" stroke-width="0.6" pointer-events="none"/>`);
    svg.push(`</g>`);
  }
  document.getElementById('board').innerHTML = svg.join('');
  document.querySelectorAll('.hitE').forEach(el =>
    el.addEventListener('click', () => onEmptyCell(+el.dataset.i)));
  document.querySelectorAll('.hitR').forEach(el => {
    el.style.cursor = 'pointer';
    el.addEventListener('click', () => onRegion(+el.dataset.i, el.dataset.part));
  });
  renderPanels();
}

const SHAPE_ORDER = ['curve', 'triangle', 'square'];
const SHAPE_LABEL = { curve: 'Curve', triangle: 'Triangle', square: 'Square' };

function miniPiece(shape) {
  const S = CELL, lite = '#e7ddc4', dark = '#cdbf9b';
  if (shape === 'square')
    return `<rect width="${S}" height="${S}" fill="${lite}" stroke="#b3a585" stroke-width="3"/>`;
  if (shape === 'triangle')
    return `<polygon points="0,0 ${S},0 ${S},${S}" fill="${dark}" stroke="#b3a585" stroke-width="3"/>`
         + `<polygon points="0,0 0,${S} ${S},${S}" fill="${lite}" stroke="#b3a585" stroke-width="3"/>`;
  return `<rect width="${S}" height="${S}" fill="${lite}" stroke="#b3a585" stroke-width="3"/>`
       + `<path d="M ${S/2},0 A ${S/2},${S/2} 0 0,1 0,${S/2} L 0,0 Z" fill="${dark}" stroke="#b3a585" stroke-width="3"/>`;
}

function renderPanels() {
  // shapes
  const ks = document.getElementById('kitShapes'); ks.innerHTML = '';
  for (const s of SHAPE_ORDER) {
    const left = shapeKit[s] || 0;
    const d = document.createElement('div');
    d.className = 'kititem' + (selKind === 'shape' && sel === s ? ' sel' : '')
      + (left <= 0 ? ' out' : '');
    d.innerHTML = `<svg width="26" height="26" viewBox="0 0 ${CELL} ${CELL}">${miniPiece(s)}</svg>`
      + `<span class="kit-name">${SHAPE_LABEL[s]}</span><span class="kit-count">&times;${left}</span>`;
    d.addEventListener('click', () => selectKit('shape', s, left));
    ks.appendChild(d);
  }
  // fabrics
  const kf = document.getElementById('kitFabrics'); kf.innerHTML = '';
  for (const f of PUZZLE.fabrics) {
    const d = document.createElement('div');
    d.className = 'kititem' + (selKind === 'fab' && sel === f ? ' sel' : '');
    d.innerHTML = `<svg width="26" height="26"><rect width="26" height="26" fill="${FABRICS[f].col}"/>`
      + `<rect width="26" height="26" fill="none" stroke="#b3a585" stroke-width="1.5"/></svg>`
      + `<span class="kit-name">${FABRICS[f].name}</span>`;
    d.addEventListener('click', () => selectKit('fab', f, 1));
    kf.appendChild(d);
  }
  // lift tool
  const kt = document.getElementById('kitTools'); kt.innerHTML = '';
  const lift = document.createElement('div');
  lift.className = 'kititem' + (selKind === 'lift' ? ' sel' : '');
  lift.innerHTML = `<span class="kit-name">Lift &mdash; remove a piece or its colour</span>`;
  lift.addEventListener('click', () => selectKit('lift', null, 1));
  kt.appendChild(lift);
  // rules panel — Assist only
  renderRules();
}

function renderRules() {
  const panel = document.getElementById('rulesPanel');
  if (!assist) { panel.innerHTML = ''; return; }
  const results = evaluateAll({ grid, colors }, PUZZLE.ruleKeys);
  const row = r => `<li><span class="mark" style="color:${r.ok?'var(--green)':'var(--ink-soft)'}">`
    + `${r.ok?'✓':'·'}</span>${r.label}</li>`;
  panel.innerHTML =
    `<div class="rule-head">Structure</div>` + results.filter(r=>r.group==='structure').map(row).join('')
    + `<div class="rule-head">Colour</div>` + results.filter(r=>r.group==='colour').map(row).join('');
}

function selectKit(kind, value, available) {
  if (kind !== 'lift' && available <= 0 && !(selKind === kind && sel === value)) return;
  if (selKind === kind && sel === value) { selKind = null; sel = null; }
  else { selKind = kind; sel = value; }
  render();
}

function isGivenCell(i) { return PUZZLE.givens.includes(i); }

function placeShape(i, shape) {
  if (isGivenCell(i)) return;
  if (grid[i]) shapeKit[grid[i].shape]++;       // free the old piece
  if ((shapeKit[shape] || 0) <= 0) { if (grid[i]) shapeKit[grid[i].shape]--; return; }
  // clear colours of whatever was here
  for (const part of ['A', 'B', 'W']) delete colors[ckey(i, part)];
  grid[i] = { shape, rot: 0 };
  shapeKit[shape]--;
}

function rotateShape(i) {
  if (isGivenCell(i) || !grid[i]) return;
  grid[i].rot = (grid[i].rot + 1) % 4;
}

function liftCell(i) {
  if (isGivenCell(i) || !grid[i]) return;
  shapeKit[grid[i].shape]++;
  grid[i] = null;
  for (const part of ['A', 'B', 'W']) delete colors[ckey(i, part)];
}

function paint(i, part, fab) {
  if (isGivenCell(i) || !grid[i]) return;
  if (fab === null) delete colors[ckey(i, part)];
  else colors[ckey(i, part)] = fab;
}

function onEmptyCell(i) {
  if (selKind === 'shape') placeShape(i, sel);
  afterMove();
}

function onRegion(i, part) {
  if (selKind === 'shape') {
    if (grid[i] && grid[i].shape === sel) rotateShape(i);
    else placeShape(i, sel);
  } else if (selKind === 'fab') {
    paint(i, part, sel);
  } else if (selKind === 'lift') {
    if (colors[ckey(i, part)]) paint(i, part, null);   // colour first
    else liftCell(i);                                   // else the whole piece
  } else if (grid[i]) {
    rotateShape(i);                                     // no tool selected → rotate
  }
  afterMove();
}

function afterMove() {
  render();
  if (isSolved({ grid, colors }, PUZZLE.ruleKeys)) {
    setTimeout(() => document.getElementById('winOverlay').classList.add('show'), 220);
  }
}

reset();
document.getElementById('resetBtn').addEventListener('click', () => {
  document.getElementById('winOverlay').classList.remove('show');
  reset();
});
</script>
</body>
</html>
