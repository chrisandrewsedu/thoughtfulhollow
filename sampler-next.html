<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sampler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fascinate&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:#faf6ec; --paper-deep:#f0e9d6; --ink:#2a2520; --ink-soft:#6a6258;
    --accent:#c01818; --green:#3a5a3a; --gold:#8a6c18; --line:#c9bd9c;
    /* Board surface — tokenised so a future dark theme overrides in one place. */
    --board-bg:#efe6cf; --cell-line:#9c8f6e;
    --cell-empty:#f3ecd8; --cell-empty-edge:#cdc1a0;
    --region-blank:#e8e3d5; --region-edge:#b3a585; --baste:#a8946a;
    --piece-shade:#cdbf9b;
  }
  * { box-sizing:border-box; margin:0; padding:0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Spectral', Georgia, serif;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── APP SHELL ── */
  .app {
    height: 100%;
    display: flex;
    flex-direction: column;
    max-width: 960px;
    margin: 0 auto;
    padding: 0.55rem 0.9rem 0.55rem;
  }

  /* ── HEADER ── */
  .header {
    flex-shrink: 0;
    margin-bottom: 0.4rem;
  }
  h1 {
    font-family: 'Fascinate', serif;
    font-weight: 400;
    font-size: 1.5rem;
    line-height: 1;
  }

  /* ── STAGE: default = phone portrait ── */
  /* Board above, kit+rules below — NO inner scrolling anywhere */
  .stage {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    overflow: hidden;
  }

  /* Board wrapper */
  .board-wrap {
    flex-shrink: 0;
    display: flex;
    justify-content: center;
  }
  #board {
    display: block;
    /* CSS var set by JS; SVG scales to whatever width we give it */
    width: var(--board-size, 240px);
    height: var(--board-size, 240px);
  }

  /* Side panel — NO overflow-y scroll; content must fit naturally */
  .side {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 0.22rem;
  }

  /* ── KIT / PANEL ELEMENTS ── */
  .side-label {
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0.22rem 0 0.16rem;
  }
  .hitE { cursor: pointer; }

  /* Unified tiles — one component for every pickable thing */
  .trow {
    display: flex;
    flex-wrap: wrap;
    gap: 0.34rem;
    align-items: flex-start;
  }
  .tw {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.12rem;
    width: 48px;
  }
  .tile {
    width: 48px;
    height: 48px;
    border: 1.5px solid var(--ink-soft);
    border-radius: 7px;
    background: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .tile svg { width: 72%; height: 72%; display: block; }
  .tile:hover { background: var(--paper-deep); }
  .tile.swatch { border-color: var(--line); }
  .tile.sel { border-color: var(--accent); box-shadow: 0 0 0 1.5px var(--accent); }
  .tile.out { opacity: 0.4; }
  .badge {
    position: absolute;
    right: 2px;
    bottom: 1px;
    font-size: 0.62rem;
    font-weight: 600;
    color: var(--ink);
    background: var(--paper);
    border-radius: 3px;
    padding: 0 0.12rem;
    line-height: 1.3;
  }
  .cap {
    font-size: 0.6rem;
    color: var(--ink-soft);
  }

  /* ── ACTIONS: erase + reset, one matched pair ── */
  .hr {
    height: 1px;
    border: 0;
    background: var(--line);
    opacity: 0.7;
    margin: 0.42rem 0 0.4rem;
  }
  .actions {
    display: flex;
    gap: 0.4rem;
  }
  .actbtn {
    flex: 1;
    height: 48px;
    border-radius: 7px;
    background: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.34rem;
    font-family: 'Spectral', serif;
    font-size: 0.84rem;
    color: var(--ink);
    cursor: pointer;
  }
  .actbtn svg { width: 20px; height: 20px; }
  .actbtn.erase { border: 1.5px solid var(--ink-soft); }
  .actbtn.erase:hover { background: var(--paper-deep); }
  .actbtn.erase.sel { border-color: var(--accent); box-shadow: 0 0 0 1.5px var(--accent); }
  .actbtn.reset { border: 1.5px solid var(--ink); }
  .actbtn.reset:hover { background: var(--ink); color: var(--paper); }

  /* ── RULES ── */
  .rulespanel {
    border: 1px solid var(--line);
    border-radius: 7px;
    background: var(--paper-deep);
    padding: 0.38rem 0.55rem 0.48rem;
  }
  .rphead {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.08rem;
  }
  .rphead .side-label { margin: 0; }
  .rules {
    list-style: none;
  }
  .rule-head {
    font-size: 0.63rem;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0.3rem 0 0.06rem;
  }
  .rules li {
    padding: 0.14rem 0;
    font-size: 0.8rem;
    display: flex;
    gap: 0.42rem;
    align-items: baseline;
  }
  .rules .mark {
    font-weight: 600;
    width: 1.1rem;
    flex-shrink: 0;
  }

  /* ── ASSIST TOGGLE ── */
  .toggle {
    display: flex;
    align-items: center;
    gap: 0.34rem;
    cursor: pointer;
    user-select: none;
  }
  .toggle .tlabel {
    font-size: 0.66rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .toggle input {
    position: absolute;
    opacity: 0;
    width: 1px;
    height: 1px;
  }
  .switch {
    width: 34px;
    height: 19px;
    border-radius: 999px;
    border: 1.5px solid var(--ink-soft);
    background: var(--paper);
    position: relative;
    flex-shrink: 0;
    transition: background 0.12s, border-color 0.12s;
  }
  .knob {
    position: absolute;
    top: 1.5px;
    left: 1.5px;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: var(--ink-soft);
    transition: left 0.12s, background 0.12s;
  }
  .toggle input:checked ~ .switch {
    background: var(--green);
    border-color: var(--green);
  }
  .toggle input:checked ~ .switch .knob {
    left: 16.5px;
    background: var(--paper);
  }
  .toggle input:focus-visible ~ .switch {
    box-shadow: 0 0 0 2px var(--paper), 0 0 0 3.5px var(--accent);
  }

  /* ── CONTROLS (win-overlay button) ── */
  button {
    font-family: 'Spectral', serif;
    font-size: 0.78rem;
    padding: 0.28rem 0.65rem;
    border: 1.5px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    border-radius: 5px;
    cursor: pointer;
  }
  button:hover { background: var(--ink); color: var(--paper); }

  /* ── PHONE PORTRAIT: kit section above rules ── */
  /* On phones we have one column; kit-section shows above rules-section */
  .kit-section { order: 1; }
  .rules-section { order: 2; }

  /* ── COMPACT PHONE: very small screens (≤480px wide or ≤780px tall in portrait) ── */
  /* Shrink everything to fit title + board + all rules + all controls with zero scroll */
  @media (max-width: 480px), (max-height: 780px) and (max-width: 500px) {
    .app {
      padding: 0.25rem 0.65rem 0.25rem;
    }
    .header { margin-bottom: 0.18rem; }
    h1 { font-size: 1.1rem; }
    .stage { gap: 0.25rem; }
    .side { gap: 0.1rem; }
    .side-label { font-size: 0.6rem; margin: 0.14rem 0 0.1rem; }
    /* Tiles shrink and go icon-only — shapes & colours read fine without captions */
    .trow { gap: 0.22rem; }
    .tw { width: 36px; gap: 0; }
    .tile { width: 36px; height: 36px; border-radius: 5px; }
    .cap { display: none; }
    .badge { font-size: 0.55rem; }
    .hr { margin: 0.22rem 0; }
    .actions { gap: 0.3rem; }
    .actbtn { height: 34px; font-size: 0.74rem; }
    .actbtn svg { width: 17px; height: 17px; }
    /* Rules card flattens to a plain list to reclaim height */
    .rulespanel { border: 0; background: none; border-radius: 0; padding: 0; }
    .rule-head { font-size: 0.56rem; margin: 0.15rem 0 0.03rem; }
    .rules li { font-size: 0.72rem; padding: 0.06rem 0; gap: 0.28rem; }
    .rules .mark { width: 0.9rem; }
    .toggle .tlabel { font-size: 0.58rem; }
    .switch { width: 30px; height: 17px; }
    .knob { width: 11px; height: 11px; }
    .toggle input:checked ~ .switch .knob { left: 14.5px; }
  }

  /* ── VERY SHORT PHONES: iPhone SE (667px) and similar ── */
  @media (max-height: 680px) and (max-width: 500px) {
    .app { padding: 0.2rem 0.6rem 0.2rem; }
    h1 { font-size: 1rem; }
    .header { margin-bottom: 0.12rem; }
    .stage { gap: 0.18rem; }
    .side { gap: 0.08rem; }
    .side-label { font-size: 0.55rem; margin: 0.1rem 0 0.07rem; }
    .tw { width: 33px; }
    .tile { width: 33px; height: 33px; }
    .hr { margin: 0.16rem 0; }
    .actbtn { height: 31px; font-size: 0.7rem; }
    .rule-head { font-size: 0.52rem; margin: 0.1rem 0 0.02rem; }
    .rules li { font-size: 0.66rem; padding: 0.04rem 0; }
    .rules .mark { width: 0.8rem; }
    .toggle .tlabel { font-size: 0.54rem; }
  }

  /* ── WIDE/LANDSCAPE: board left, side right ── */
  @media (min-width: 600px) {
    .stage {
      flex-direction: row;
      align-items: flex-start;
    }
    .board-wrap {
      flex-shrink: 0;
      align-items: flex-start;
    }
    .side {
      /* natural block flow in side-by-side layout */
    }
    /* On wide screens, rules go ABOVE kit in reading order */
    .kit-section { order: 2; }
    .rules-section { order: 1; }
  }

  /* ── SHORT LANDSCAPE (phones rotated, small laptops) ── */
  @media (max-height: 640px) and (min-width: 500px) {
    .stage {
      flex-direction: row;
      align-items: flex-start;
    }
    h1 { font-size: 1.2rem; }
    .header { margin-bottom: 0.2rem; }
    .app { padding: 0.35rem 0.7rem 0.35rem; }
    /* Compact the side panel so it fits beside the board without scroll */
    .side-label { margin: 0.1rem 0 0.1rem; }
    .tw { width: 40px; gap: 0; }
    .tile { width: 40px; height: 40px; }
    .cap { display: none; }
    .hr { margin: 0.26rem 0; }
    .actbtn { height: 40px; }
    .rulespanel { padding: 0.3rem 0.5rem 0.36rem; }
    .rule-head { margin: 0.2rem 0 0.04rem; }
    .rules li { padding: 0.1rem 0; }
  }

  /* ── RESPONSIVE FONT SCALING ── */
  @media (min-width: 768px) {
    html { font-size: 110%; }
    .app { padding: 0.75rem 1.1rem; }
  }
  @media (min-width: 1100px) {
    html { font-size: 118%; }
    .app { max-width: 1020px; padding: 0.9rem 1.4rem; }
  }
  @media (min-width: 1400px) {
    html { font-size: 122%; }
    .app { max-width: 1100px; }
  }

  /* ── WIN OVERLAY ── */
  .win {
    position: fixed;
    inset: 0;
    background: rgba(42,37,32,0.93);
    color: var(--paper);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0.6rem;
    text-align: center;
    padding: 2rem;
    z-index: 10;
  }
  .win.show { display: flex; }
  .win h2 { font-family: 'Fascinate', serif; font-weight: 400; font-size: 2.2rem; }
  .win button { background: var(--paper); margin-top: 0.5rem; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>Sampler</h1>
  </div>

  <div class="stage">
    <div class="board-wrap">
      <svg id="board" viewBox="0 0 344 344"></svg>
    </div>
    <div class="side">
      <!-- Kit section (shapes/fabrics/erase/reset) — shown first on phones -->
      <div class="kit-section">
        <div class="side-label">Shapes</div>
        <div class="trow" id="kitShapes"></div>
        <div class="side-label">Fabrics</div>
        <div class="trow" id="kitFabrics"></div>
        <hr class="hr">
        <div class="actions">
          <div class="actbtn erase" id="eraseBtn">
            <svg viewBox="0 0 82 82" aria-hidden="true"><g transform="rotate(-40 41 41)"><rect x="14" y="30" width="54" height="24" rx="5" fill="#d8cbab" stroke="#8a7d5e" stroke-width="3"/><rect x="14" y="30" width="20" height="24" rx="5" fill="#c0b088" stroke="#8a7d5e" stroke-width="3"/></g></svg>
            <span>Erase</span>
          </div>
          <button class="actbtn reset" id="resetBtn">Reset</button>
        </div>
      </div>
      <!-- Rules section — shown below kit on phones, above kit on wider screens -->
      <div class="rules-section">
        <div class="rulespanel">
          <div class="rphead">
            <span class="side-label">Rules</span>
            <label class="toggle">
              <span class="tlabel">Assist</span>
              <input type="checkbox" id="assistToggle">
              <span class="switch"><span class="knob"></span></span>
            </label>
          </div>
          <ul class="rules" id="rulesPanel"></ul>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="win" id="winOverlay">
  <h2>All of a piece.</h2>
  <p>Every rule met &mdash; structure and colour together.</p>
  <button id="lookAgainBtn">Look again</button>
</div>

<script src="sampler-next.engine.js"></script>
<script src="sampler-next.templates.js"></script>
<script src="sampler-next.solver.js"></script>
<script src="sampler-next.generator.js"></script>
<script>
'use strict';

// ── Today's puzzle ───────────────────────────────────────────────
// Phase B retires hand-authoring: the daily puzzle is generated from a
// constraint-template, seeded by the date. ?date=YYYY-MM-DD force-routes.
function forcedDate() {
  const m = /[?&]date=(\d{4}-\d{2}-\d{2})/.exec(location.search);
  return m ? m[1] : null;
}
const PUZZLE = generateDaily(forcedDate() || todayStr());

// ── Board sizing ─────────────────────────────────────────────────
// Compute the side length (px) for the board SVG element.
// The SVG has viewBox="0 0 344 344" so we just set width=height=N.
//
// CRITICAL CONSTRAINT: no inner-scroll anywhere. The board + all side
// content (shapes, fabrics, erase, reset, assist, all 8 rules) must fit
// simultaneously in the viewport on every screen size.
//
// Empirical side-panel heights (after CSS compaction):
//   – iPhone SE portrait (375×667): ~290px needed for side content
//   – Medium phones (390–430×780+): ~270px
//   – Tablet/desktop: side panel is beside the board, not below
function computeBoardSize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const sideBySide = vw >= 600 || (vh <= 640 && vw >= 500);

  let size;
  if (sideBySide) {
    // board shares the row with the side panel
    // give board at most 48% of viewport width, but also must fit height
    const maxByW = Math.floor(vw * 0.47);
    // App padding (approx 0.35–0.55rem top+bottom ≈ 11–18px) + header (~28px) + gap
    const headerAllowance = vh <= 640 ? 55 : 70;
    const maxByH = Math.floor((vh - headerAllowance) * 0.97);
    size = Math.min(maxByW, maxByH, 460);
  } else {
    // Phone portrait: board stacks above side content.
    // Determine how much height the side panel needs based on viewport.
    // We compact heavily on tiny screens so the side panel shrinks too.
    let sideH;
    if (vh <= 680) {
      // iPhone SE (375×667): very compact CSS — icon-only 33px tiles, flat
      // rules list. Side content: shapes + fabrics tile rows, erase/reset row,
      // rules header + 2 group heads + 8 rule rows + label gaps/margins.
      sideH = 322;
    } else if (vh <= 780) {
      // Small phones (360×780 etc.) — slightly more vertical space, less cramped CSS
      sideH = 310;
    } else if (vh <= 900) {
      sideH = 300;
    } else {
      sideH = 295;
    }
    // App padding: small screens get 0.2–0.25rem top+bottom ≈ ~7–10px each
    // Header: ~28–32px + margin ~0.12–0.18rem
    const appPadV = vh <= 680 ? 8 : (vh <= 780 ? 10 : 16);
    const headerH = vh <= 680 ? 34 : (vh <= 780 ? 36 : 44);
    const stageGap = vh <= 680 ? 7 : (vh <= 780 ? 9 : 14);
    const availForBoard = vh - appPadV - headerH - stageGap - sideH;
    const maxByW = vw - 18;
    size = Math.min(availForBoard, maxByW, 420);
  }
  size = Math.max(size, 160);
  return size;
}

function applyBoardSize() {
  const size = computeBoardSize();
  document.documentElement.style.setProperty('--board-size', size + 'px');
}

window.addEventListener('resize', applyBoardSize);

// ── state ────────────────────────────────────────────────────────
const CELL = 82, PAD = 8;
let grid, colors, shapeKit, selKind = null, sel = null, assist = false;

function ckey(i, part) { return i + ':' + part; }

function reset() {
  grid = new Array(NCELL).fill(null);
  colors = {};
  shapeKit = Object.assign({}, PUZZLE.kit);
  for (const i of PUZZLE.givens) {
    const s = PUZZLE.solution[i];
    grid[i] = { shape: s.shape, rot: s.rot };
    shapeKit[s.shape]--;
    for (const part in s.col) colors[ckey(i, part)] = s.col[part];
  }
  selKind = null; sel = null;
  render();
}

// ── piece geometry (SVG) ─────────────────────────────────────────
function regionShapes(shape) {
  const S = CELL;
  if (shape === 'square') return [{ part: 'W', tag: 'rect', attr: `width="${S}" height="${S}"`, rot: false }];
  if (shape === 'triangle') return [
    { part: 'A', tag: 'polygon', attr: `points="0,0 ${S},0 ${S},${S}"`, rot: true },
    { part: 'B', tag: 'polygon', attr: `points="0,0 0,${S} ${S},${S}"`, rot: true },
  ];
  return [
    { part: 'B', tag: 'rect', attr: `width="${S}" height="${S}"`, rot: false },
    { part: 'A', tag: 'path', attr: `d="M ${S/2},0 A ${S/2},${S/2} 0 0,1 0,${S/2} L 0,0 Z"`, rot: true },
  ];
}

// ── render ───────────────────────────────────────────────────────
function render() {
  const isGiven = i => PUZZLE.givens.includes(i);
  // Evaluate the board exactly once per render; thread the result to the
  // panels and (via afterMove) the win check.
  const results = evaluateAll({ grid, colors, kit: PUZZLE.kit }, PUZZLE.ruleKeys);
  const bad = new Set();
  if (results) for (const r of results) for (const v of r.violations) bad.add(v);

  const svg = [];
  svg.push(`<rect x="${PAD}" y="${PAD}" width="${GRID*CELL}" height="${GRID*CELL}" fill="var(--board-bg)"/>`);
  for (let i = 0; i < NCELL; i++) {
    const x = PAD + (i % GRID) * CELL, y = PAD + Math.floor(i / GRID) * CELL;
    const cell = grid[i];
    svg.push(`<g transform="translate(${x},${y})">`);
    if (!cell) {
      svg.push(`<rect class="hitE" data-i="${i}" width="${CELL}" height="${CELL}"
        fill="var(--cell-empty)" stroke="var(--cell-empty-edge)" stroke-width="1" stroke-dasharray="4 3"/>`);
    } else {
      for (const rg of regionShapes(cell.shape)) {
        const fab = colors[ckey(i, rg.part)];
        const fill = fab ? FABRICS[fab].col : 'var(--region-blank)';
        const o = rg.rot ? `<g transform="rotate(${cell.rot*90} ${CELL/2} ${CELL/2})">` : '';
        const c = rg.rot ? '</g>' : '';
        // Coloured regions get a clean solid edge ("sewn down"). Uncoloured
        // regions are drawn edgeless here — a basting overlay is added below.
        const edge = fab ? ` stroke="var(--region-edge)" stroke-width="1.1"` : ` stroke="none"`;
        svg.push(`${o}<${rg.tag} class="hitR" data-i="${i}" data-part="${rg.part}" ${rg.attr}`
          + ` fill="${fill}"${edge}/>${c}`);
      }
    }
    const border = (assist && bad.has(i)) ? 'var(--accent)' : 'var(--cell-line)';
    const bw = (assist && bad.has(i)) ? 3 : 1.4;
    svg.push(`<rect width="${CELL}" height="${CELL}" fill="none" pointer-events="none"
      stroke="${border}" stroke-width="${bw}"/>`);
    // Basting stitches mark every uncoloured region — drawn on top of the cell
    // border so nothing can hide them. A fabric fill (solid or pattern) can
    // never produce a dashed edge, so "uncoloured" stays unmistakable for any
    // puzzle's palette.
    if (cell) {
      for (const rg of regionShapes(cell.shape)) {
        if (colors[ckey(i, rg.part)]) continue;
        const o = rg.rot ? `<g transform="rotate(${cell.rot*90} ${CELL/2} ${CELL/2})">` : '';
        const c = rg.rot ? '</g>' : '';
        svg.push(`${o}<${rg.tag} ${rg.attr} fill="none" pointer-events="none"`
          + ` stroke="var(--baste)" stroke-width="2.2" stroke-dasharray="4 3"/>${c}`);
      }
    }
    if (isGiven(i)) svg.push(`<circle cx="${CELL-9}" cy="9" r="3.3" fill="var(--gold)"
      stroke="#2a2520" stroke-width="0.6" pointer-events="none"/>`);
    svg.push(`</g>`);
  }
  document.getElementById('board').innerHTML = svg.join('');
  document.querySelectorAll('.hitE').forEach(el =>
    el.addEventListener('click', () => onEmptyCell(+el.dataset.i)));
  document.querySelectorAll('.hitR').forEach(el => {
    el.style.cursor = 'pointer';
    el.addEventListener('click', () => onRegion(+el.dataset.i, el.dataset.part));
  });
  renderPanels(results);
  return results;
}

const SHAPE_ORDER = ['curve', 'triangle', 'square'];
const SHAPE_LABEL = { curve: 'Curve', triangle: 'Triangle', square: 'Square' };

function miniPiece(shape) {
  const S = CELL, lite = 'var(--region-blank)', dark = 'var(--piece-shade)';
  if (shape === 'square')
    return `<rect width="${S}" height="${S}" fill="${lite}" stroke="var(--region-edge)" stroke-width="3"/>`;
  if (shape === 'triangle')
    return `<polygon points="0,0 ${S},0 ${S},${S}" fill="${dark}" stroke="var(--region-edge)" stroke-width="3"/>`
         + `<polygon points="0,0 0,${S} ${S},${S}" fill="${lite}" stroke="var(--region-edge)" stroke-width="3"/>`;
  return `<rect width="${S}" height="${S}" fill="${lite}" stroke="var(--region-edge)" stroke-width="3"/>`
       + `<path d="M ${S/2},0 A ${S/2},${S/2} 0 0,1 0,${S/2} L 0,0 Z" fill="${dark}" stroke="var(--region-edge)" stroke-width="3"/>`;
}

function renderPanels(results) {
  // shapes — uniform tile + count badge + caption
  const ks = document.getElementById('kitShapes'); ks.innerHTML = '';
  for (const s of SHAPE_ORDER) {
    const left = shapeKit[s] || 0;
    const tw = document.createElement('div');
    tw.className = 'tw';
    const cls = 'tile' + (selKind === 'shape' && sel === s ? ' sel' : '')
      + (left <= 0 ? ' out' : '');
    tw.innerHTML = `<div class="${cls}"><svg viewBox="0 0 ${CELL} ${CELL}">${miniPiece(s)}</svg>`
      + `<span class="badge">${left}</span></div><span class="cap">${SHAPE_LABEL[s]}</span>`;
    tw.querySelector('.tile').addEventListener('click', () => selectKit('shape', s, left));
    ks.appendChild(tw);
  }
  // fabrics — uniform tile, full-bleed colour swatch + caption
  const kf = document.getElementById('kitFabrics'); kf.innerHTML = '';
  for (const f of PUZZLE.fabrics) {
    const tw = document.createElement('div');
    tw.className = 'tw';
    const cls = 'tile swatch' + (selKind === 'fab' && sel === f ? ' sel' : '');
    tw.innerHTML = `<div class="${cls}" style="background:${FABRICS[f].col}"></div>`
      + `<span class="cap">${FABRICS[f].name}</span>`;
    tw.querySelector('.tile').addEventListener('click', () => selectKit('fab', f, 1));
    kf.appendChild(tw);
  }
  // erase tool — static element, just sync its selected state
  document.getElementById('eraseBtn').classList.toggle('sel', selKind === 'erase');
  // rules panel
  renderRules(results);
}

function renderRules(results) {
  const panel = document.getElementById('rulesPanel');

  // Status marks come from the threaded evaluation — only shown with Assist on.
  let statusMap = null;
  if (assist) {
    statusMap = {};
    for (const r of results) statusMap[r.key] = r.ok;
  }

  const groups = ['structure', 'colour'];
  const groupLabel = { structure: 'Structure', colour: 'Colour' };

  const rows = PUZZLE.ruleKeys.map(key => {
    const def = RULES[key];
    let mark = '';
    let markStyle = '';
    if (statusMap !== null) {
      const ok = statusMap[key];
      mark = ok ? '✓' : '·';
      markStyle = `color:${ok ? 'var(--green)' : 'var(--ink-soft)'}`;
    }
    return { key, group: def.group, label: def.label, mark, markStyle };
  });

  let html = '';
  for (const g of groups) {
    const groupRows = rows.filter(r => r.group === g);
    if (groupRows.length === 0) continue;
    html += `<div class="rule-head">${groupLabel[g]}</div>`;
    for (const r of groupRows) {
      html += `<li><span class="mark" style="${r.markStyle}">${r.mark}</span>${r.label}</li>`;
    }
  }
  panel.innerHTML = html;
}

function selectKit(kind, value, available) {
  if (kind !== 'erase' && available <= 0 && !(selKind === kind && sel === value)) return;
  if (selKind === kind && sel === value) { selKind = null; sel = null; }
  else { selKind = kind; sel = value; }
  render();
}

function isGivenCell(i) { return PUZZLE.givens.includes(i); }

function placeShape(i, shape) {
  if (isGivenCell(i)) return;
  if (grid[i]) shapeKit[grid[i].shape]++;
  if ((shapeKit[shape] || 0) <= 0) { if (grid[i]) shapeKit[grid[i].shape]--; return; }
  for (const part of ['A', 'B', 'W']) delete colors[ckey(i, part)];
  grid[i] = { shape, rot: 0 };
  shapeKit[shape]--;
}

function rotateShape(i) {
  if (isGivenCell(i) || !grid[i]) return;
  grid[i].rot = (grid[i].rot + 1) % 4;
}

// Erase removes the whole piece — shape and its colours together.
function eraseCell(i) {
  if (isGivenCell(i) || !grid[i]) return;
  shapeKit[grid[i].shape]++;
  grid[i] = null;
  for (const part of ['A', 'B', 'W']) delete colors[ckey(i, part)];
}

function paint(i, part, fab) {
  if (isGivenCell(i) || !grid[i]) return;
  colors[ckey(i, part)] = fab;
}

function onEmptyCell(i) {
  if (selKind === 'shape') placeShape(i, sel);
  afterMove();
}

function onRegion(i, part) {
  if (selKind === 'shape') {
    if (grid[i] && grid[i].shape === sel) rotateShape(i);
    else placeShape(i, sel);
  } else if (selKind === 'fab') {
    paint(i, part, sel);
  } else if (selKind === 'erase') {
    eraseCell(i);
  } else if (grid[i]) {
    rotateShape(i);
  }
  afterMove();
}

function afterMove() {
  const results = render();
  const solved = grid.every(Boolean)
    && fullyColoured({ grid, colors })
    && results.every(r => r.ok);
  if (solved) {
    setTimeout(() => document.getElementById('winOverlay').classList.add('show'), 220);
  }
}

// Apply board sizing then start the game
if (!PUZZLE) {
  document.querySelector('.stage').innerHTML =
    '<p style="padding:1.2rem;font-size:0.95rem">No Sampler puzzle is available for this date yet.</p>';
} else {
  applyBoardSize();
  reset();

  document.getElementById('eraseBtn').addEventListener('click', () => selectKit('erase', null, 1));
  document.getElementById('resetBtn').addEventListener('click', () => {
    document.getElementById('winOverlay').classList.remove('show');
    reset();
  });
  document.getElementById('assistToggle').addEventListener('change', e => {
    assist = e.target.checked;
    render();
  });
  document.getElementById('lookAgainBtn').addEventListener('click', () => {
    document.getElementById('winOverlay').classList.remove('show');
  });
}
</script>
</body>
</html>
