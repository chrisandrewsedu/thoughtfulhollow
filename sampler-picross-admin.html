<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="./admin-auth.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sampler picross — admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fascinate&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./sampler-picross.css">
<style>
  body { padding: 1.2rem 1rem 2rem; }
  .app { max-width: 1180px; margin: 0 auto; }

  .header {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: baseline;
    gap: var(--sp-2) var(--sp-3);
    margin-bottom: var(--sp-4);
  }
  .header-title { display: flex; align-items: baseline; gap: var(--sp-3); flex-wrap: wrap; min-width: 0; }
  .header-controls { display: flex; align-items: center; gap: var(--sp-2); flex-wrap: wrap; justify-content: flex-end; }
  h1 { font-family: 'Fascinate', serif; font-size: var(--fs-display); font-weight: 400; line-height: 1; }
  .header .sub { color: var(--ink-soft); font-size: var(--fs-sm); }
  .nav-link {
    color: var(--ink-soft);
    text-decoration: none;
    font-size: var(--fs-sm);
    border: 1px solid var(--line);
    background: var(--paper-deep);
    padding: 0.32rem 0.7rem;
    border-radius: var(--r-sm);
    transition: background var(--dur-fast) var(--ease-quilt);
  }
  .nav-link:hover { background: var(--paper); }

  /* Stat tiles (replaces the inline status-bar text). */
  .status-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: var(--sp-2);
    margin-bottom: var(--sp-4);
  }
  .status-bar .stat-tile {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: var(--sp-3) var(--sp-4);
    box-shadow: var(--shadow-paper);
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .status-bar .stat-tile .lbl {
    font-size: var(--fs-xs);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
  }
  .status-bar .stat-tile .val {
    font-family: 'Fascinate', serif;
    font-size: var(--fs-xl);
    color: var(--ink);
    line-height: 1.1;
  }
  .status-bar .stat-tile .sub { font-size: var(--fs-xs); color: var(--ink-soft); }
  .status-bar .stat-tile.warn { background: #fbeeee; border-color: var(--accent-soft); }
  .status-bar .stat-tile.warn .val { color: var(--accent); }
  /* Fallback for legacy plain-text content slot used by the boot script. */
  .status-bar .stat { display: flex; align-items: baseline; gap: 0.4rem; }
  .status-bar .stat .num { font-weight: 600; font-size: var(--fs-lg); }
  .status-bar .warn { color: var(--accent); }

  .views {
    display: flex;
    border-bottom: 1.5px solid var(--line);
    margin-bottom: var(--sp-4);
    gap: 0.2rem;
  }
  .view-tab {
    background: transparent;
    border: 0;
    padding: 0.6rem 1.2rem;
    font-family: 'Spectral', serif;
    font-size: var(--fs-md);
    color: var(--ink-soft);
    cursor: pointer;
    border-bottom: 2.5px solid transparent;
    margin-bottom: -1.5px;
    transition: color var(--dur-fast) var(--ease-quilt),
                border-color var(--dur-mid) var(--ease-quilt);
    position: relative;
  }
  .view-tab:hover { color: var(--ink); }
  .view-tab.active {
    color: var(--ink);
    border-bottom-color: var(--accent);
    font-weight: 500;
  }

  /* Schedule strip */
  .schedule {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: var(--sp-2);
    margin-bottom: var(--sp-4);
  }
  .day {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: var(--sp-2) var(--sp-3) var(--sp-3);
    min-height: 130px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
    box-shadow: var(--shadow-paper);
    transition: transform var(--dur-fast) var(--ease-quilt),
                box-shadow var(--dur-fast) var(--ease-quilt),
                border-color var(--dur-fast) var(--ease-quilt);
  }
  .day:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lift);
    border-color: var(--ink-soft);
  }
  .day:hover .day-thumb { transform: scale(1.08); }
  .day:hover .day-thumb { box-shadow: 0 2px 8px rgba(48,40,28,0.18); }
  .day.today { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), var(--shadow-paper); }
  .day.empty {
    background-image: repeating-linear-gradient(45deg, transparent 0 6px, rgba(0,0,0,0.04) 6px 8px);
  }
  .day.past { opacity: 0.6; }
  .day-label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
  }
  .day-date { font-size: 0.95rem; color: var(--ink); font-variant-numeric: tabular-nums; }
  .day-name { font-size: 0.86rem; color: var(--ink); font-weight: 500; }
  .day-author { font-size: 0.74rem; color: var(--ink-soft); font-style: italic; }
  .day-diff {
    font-size: 0.66rem;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .day-thumb {
    width: 100%; aspect-ratio: 1;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r-sm);
    overflow: hidden;
    display: grid;
    margin: 0.2rem 0;
    transition: transform var(--dur-mid) var(--ease-quilt),
                box-shadow var(--dur-mid) var(--ease-quilt);
    transform-origin: center;
  }
  .day-thumb .ttc { width: 100%; height: 100%; }
  .day-actions { display: flex; gap: 0.3rem; margin-top: auto; }
  .day-actions a {
    font-size: 0.74rem;
    color: var(--ink);
    text-decoration: none;
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 0.16rem 0.4rem;
    background: var(--paper);
  }
  .day-actions a:hover { background: var(--paper-deep); }
  .day-actions a.add {
    color: var(--paper);
    background: var(--ink);
    border-color: var(--ink);
  }
  .day-actions input.set-date {
    font-size: 0.74rem;
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 0.16rem 0.3rem;
    background: var(--paper);
    font-family: inherit;
  }
  .day-err {
    margin-top: 0.3rem;
    color: var(--accent);
    font-size: 0.72rem;
  }
  .day.backlog .day-label { color: var(--gold); }
  .day-actions a.from-backlog {
    color: var(--ink);
    background: var(--paper);
    border-color: var(--line);
  }
  .backlog-pop {
    position: absolute;
    top: 100%; left: 0;
    z-index: 10;
    background: var(--paper);
    border: 1.5px solid var(--ink-soft);
    border-radius: 6px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    padding: 0.35rem;
    min-width: 200px;
    max-height: 280px;
    overflow-y: auto;
  }
  .backlog-pop .pop-row {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.25rem 0.4rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.8rem;
  }
  .backlog-pop .pop-row:hover { background: var(--paper-deep); }
  .backlog-pop .pop-thumb { width: 28px; height: 28px; flex: 0 0 28px; }
  .backlog-pop .pop-thumb svg { width: 100%; height: 100%; }
  .backlog-pop .pop-name { font-weight: 500; }
  .backlog-pop .pop-meta { color: var(--ink-soft); font-size: 0.7rem; }
  .backlog-pop .pop-empty { padding: 0.4rem; font-style: italic; color: var(--ink-soft); }

  /* Library list */
  .library {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.7rem;
  }
  .library .day { min-height: 0; }
  .lib-filter {
    margin-bottom: 0.8rem;
    display: flex; gap: 0.4rem; align-items: center;
  }
  .lib-filter select {
    font-family: 'Spectral', serif; font-size: 0.9rem;
    color: var(--ink); background: var(--paper-deep);
    border: 1px solid var(--line); border-radius: 5px;
    padding: 0.3rem 0.55rem;
  }

  .empty-msg {
    color: var(--ink-soft);
    font-style: italic;
    padding: 2rem 1rem;
    text-align: center;
  }
</style>
</head>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="g-square" viewBox="0 0 20 20">
      <rect x="2" y="2" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6"/>
    </symbol>
    <symbol id="g-triangle" viewBox="0 0 20 20">
      <rect x="2" y="2" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6"/>
      <line x1="2" y1="2" x2="18" y2="18" stroke="currentColor" stroke-width="1.6"/>
    </symbol>
    <symbol id="g-curve" viewBox="0 0 20 20">
      <rect x="2" y="2" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6"/>
      <path d="M 2 18 A 16 16 0 0 1 18 2" fill="none" stroke="currentColor" stroke-width="1.6"/>
    </symbol>
  </defs>
</svg>

<!-- Dynamic fabric pattern defs — populated lazily by ensurePattern(). -->
<svg id="fabric-defs" width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs></defs>
</svg>

<div class="app">
  <div class="header">
    <div class="header-title">
      <h1>Sampler picross — admin</h1>
      <span class="sub">Schedule, browse, edit.</span>
    </div>
    <div class="header-controls">
      <a class="nav-link" href="./sampler-picross-author.html">✎ new design</a>
      <a class="nav-link" href="./sampler-picross-archive.html">archive</a>
      <a class="nav-link" href="./sampler-picross.html">→ play today</a>
    </div>
  </div>

  <div id="statusBar" class="status-bar"></div>

  <div class="views">
    <button class="view-tab active" data-view="schedule">Schedule</button>
    <button class="view-tab" data-view="library">Library</button>
    <button class="view-tab" data-view="backlog" id="backlogTab">Backlog</button>
  </div>

  <div id="viewBody"></div>
</div>

<script>
(function(){
'use strict';
// Sampler picross engine — geometry, fabrics, target validation, clue derivation.
// Pure logic, no DOM. Loadable in browser (via script tag) and Node.
//
// Grid size is per-target: a target is an array of N*N cells where N ∈ {3,4,5,6,7,8,9}.
// Helpers take `size` (the side length) where needed, OR derive it from
// `target.length`. There is no global GRID constant any more.

const DIRS = ['N', 'E', 'S', 'W'];
const SUPPORTED_SIZES = [3, 4, 5, 6, 7, 8, 9];

function gridSizeOf(target) {
  const n = Math.round(Math.sqrt(target.length));
  if (n * n !== target.length) throw new Error('target length must be a perfect square');
  return n;
}

function rowOf(i, size) { return Math.floor(i / size); }
function colOf(i, size) { return i % size; }
function rowCells(r, size) {
  const out = [];
  for (let c = 0; c < size; c++) out.push(r * size + c);
  return out;
}
function colCells(c, size) {
  const out = [];
  for (let r = 0; r < size; r++) out.push(r * size + c);
  return out;
}
function partnerOf(i, size) { return size * size - 1 - i; }

// ── Pieces ───────────────────────────────────────────────────────
// shapes:
//   square   — single fabric region W.
//   triangle — half-square triangle, seam is a diagonal. 2 rotations:
//              rot 0 = '\' seam (A=NE half, B=SW half),
//              rot 1 = '/' seam (A=SE half, B=NW half).
//              (Rotating 180° just swaps A/B labels — that's stored as the
//              same rot with the regions swapped, not a separate rotation.)
//   curve    — Drunkard's-Path quarter-circle (A=disc, B=field). 4 rotations,
//              one per corner where the disc sits (rot 0 = disc in NW).
//   bar      — two equal rectangles (a "rail" unit). 2 rotations:
//              rot 0 = horizontal cut (A=top, B=bottom),
//              rot 1 = vertical cut (A=right, B=left after a 90° rotation).
//   qst      — quarter-square triangle / hourglass: 4 triangles meeting at
//              centre, opposite pairs share fabric. 1 rotation: A=top+bottom,
//              B=left+right. (90° rotation just swaps A/B.)
const SHAPES = ['square', 'triangle', 'curve', 'bar', 'qst'];

function partsOf(shape) {
  return shape === 'square' ? ['W'] : ['A', 'B'];
}

// Default rotation per shape — a piece in this rotation does not count toward
// the ⟲ rotation total.
const DEFAULT_ROT = { square: 0, triangle: 0, curve: 0, bar: 0, qst: 0 };
const ROT_COUNT   = { square: 1, triangle: 2, curve: 4, bar: 2, qst: 1 };

// curve continuity ports by rotation (rot 0 = disc in the NW corner)
const CURVE_PORTS = { 0: ['N', 'W'], 1: ['N', 'E'], 2: ['S', 'E'], 3: ['S', 'W'] };

// Triangle region by rotation. rot 0 = '\' seam from NW to SE corner:
// region A is the NE half, region B is the SW half. rot 1 = '/' seam.
const TRIANGLE_FACES = {
  0: { N: 'A', E: 'A', S: 'B', W: 'B' },
  1: { N: 'B', E: 'A', S: 'A', W: 'B' },
};

// Partner-under-180° for half-turn symmetry. Returns the (rot, A↔B-swap) that
// makes a cell's partner look identical after spinning the board 180°. For
// triangle/bar a 180° rotation re-uses the same rot with the A/B labels
// swapped; for curve it lands on (rot+2)%4 with no swap; qst and square are
// fully symmetric under 180°.
function partnerSymmetry(shape, rot) {
  if (shape === 'square') return { rot: 0,             swap: false };
  if (shape === 'curve')  return { rot: (rot + 2) % 4, swap: false };
  if (shape === 'qst')    return { rot: 0,             swap: false };
  return { rot, swap: true }; // triangle, bar
}

// ── Fabrics ──────────────────────────────────────────────────────
const FABRICS = {
  LINEN:    { name: 'Linen',    col: '#ece0c8', hue: 'neutral' },
  FLAX:     { name: 'Flax',     col: '#d6c79b', hue: 'neutral' },
  SAGE:     { name: 'Sage',     col: '#b3b89a', hue: 'neutral' },
  MADDER:   { name: 'Madder',   col: '#a8392f', hue: 'warm' },
  MARIGOLD: { name: 'Marigold', col: '#d99838', hue: 'warm' },
  CLARET:   { name: 'Claret',   col: '#7d2933', hue: 'warm' },
  INDIGO:   { name: 'Indigo',   col: '#2b3a5e', hue: 'cool' },
  SLATE:    { name: 'Slate',    col: '#5f7b87', hue: 'cool' },
  TEAL:     { name: 'Teal',     col: '#2f6d6a', hue: 'cool' },
};

// ── Patterns ─────────────────────────────────────────────────────
// A fabric is a (color × pattern) combination. PATTERNS holds the pattern
// templates — each has a tile size and a render(base, ink) function that
// returns the inner SVG markup of an SVG <pattern> element. DOM injection
// lives in the page-level renderer (engine stays DOM-free).
const PATTERNS = {
  weave: {
    name: 'Plain weave',
    tile: 6,
    render: (base, ink) => `
      <rect width="6" height="6" fill="${base}"/>
      <rect x="0" y="0" width="6" height="3" fill="rgba(0,0,0,0.10)"/>
      <rect x="0" y="0" width="3" height="6" fill="rgba(255,255,255,0.08)"/>
      <rect x="1" y="4" width="1" height="1" fill="rgba(0,0,0,0.14)"/>
      <rect x="4" y="1" width="1" height="1" fill="rgba(255,255,255,0.10)"/>
    `,
  },
  trellis: {
    name: 'Diamond trellis',
    tile: 24,
    render: (base, ink) => `
      <rect width="24" height="24" fill="${base}"/>
      <g>
        <rect x="0" y="11" width="24" height="2" fill="rgba(0,0,0,0.09)"/>
        <rect x="11" y="0" width="2" height="24" fill="rgba(255,255,255,0.07)"/>
      </g>
      <g fill="none" stroke="${ink}" stroke-width="0.9" opacity="0.9">
        <path d="M 6 2 L 10 6 L 6 10 L 2 6 Z"/>
        <path d="M 18 2 L 22 6 L 18 10 L 14 6 Z"/>
        <path d="M 6 14 L 10 18 L 6 22 L 2 18 Z"/>
        <path d="M 18 14 L 22 18 L 18 22 L 14 18 Z"/>
      </g>
      <g fill="${ink}" opacity="0.9">
        <circle cx="6"  cy="6"  r="0.9"/>
        <circle cx="18" cy="6"  r="0.9"/>
        <circle cx="6"  cy="18" r="0.9"/>
        <circle cx="18" cy="18" r="0.9"/>
      </g>
    `,
  },
  cross: {
    name: 'Cross-stitch',
    tile: 20,
    render: (base, ink) => `
      <rect width="20" height="20" fill="${base}"/>
      <g>
        <rect x="0" y="0" width="20" height="2" fill="rgba(0,0,0,0.09)"/>
        <rect x="0" y="10" width="20" height="2" fill="rgba(0,0,0,0.09)"/>
        <rect x="0" y="0" width="2" height="20" fill="rgba(255,255,255,0.07)"/>
        <rect x="10" y="0" width="2" height="20" fill="rgba(255,255,255,0.07)"/>
      </g>
      <g stroke="${ink}" stroke-width="1.4" stroke-linecap="square" opacity="0.95">
        <line x1="6" y1="6" x2="14" y2="14"/>
        <line x1="14" y1="6" x2="6" y2="14"/>
      </g>
    `,
  },
  floret: {
    name: 'Floret',
    tile: 24,
    render: (base, ink) => `
      <rect width="24" height="24" fill="${base}"/>
      <g>
        <rect x="0" y="11" width="24" height="2" fill="rgba(0,0,0,0.09)"/>
        <rect x="11" y="0" width="2" height="24" fill="rgba(255,255,255,0.07)"/>
      </g>
      <g fill="${ink}" opacity="0.92">
        <circle cx="6"  cy="6"  r="1.1"/>
        <circle cx="6"  cy="3"  r="0.9"/><circle cx="9"  cy="6"  r="0.9"/><circle cx="6"  cy="9"  r="0.9"/><circle cx="3"  cy="6"  r="0.9"/>
        <circle cx="18" cy="6"  r="1.1"/>
        <circle cx="18" cy="3"  r="0.9"/><circle cx="21" cy="6"  r="0.9"/><circle cx="18" cy="9"  r="0.9"/><circle cx="15" cy="6"  r="0.9"/>
        <circle cx="6"  cy="18" r="1.1"/>
        <circle cx="6"  cy="15" r="0.9"/><circle cx="9"  cy="18" r="0.9"/><circle cx="6"  cy="21" r="0.9"/><circle cx="3"  cy="18" r="0.9"/>
        <circle cx="18" cy="18" r="1.1"/>
        <circle cx="18" cy="15" r="0.9"/><circle cx="21" cy="18" r="0.9"/><circle cx="18" cy="21" r="0.9"/><circle cx="15" cy="18" r="0.9"/>
      </g>
    `,
  },
};
const DEFAULT_PATTERN = 'weave';

// ── Luminance & contrast ink (WCAG-style) ────────────────────────
// Motif ink and shape-outline ink are computed from the base color's
// luminance so dark fabrics get a cream ink and light fabrics get a dark
// ink. Same ink drives both pattern motifs and shape outlines on top.
const INK_DARK  = '#2b2418';
const INK_LIGHT = '#ece0c8';
function hexToRgb(hex) {
  const h = hex.replace('#','');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
}
function relLuminance(hex) {
  const [r,g,b] = hexToRgb(hex).map(v => {
    v /= 255;
    return v <= 0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4);
  });
  return 0.2126*r + 0.7152*g + 0.0722*b;
}
function inkFor(colorIdOrHex) {
  const hex = (colorIdOrHex && FABRICS[colorIdOrHex]?.col) || colorIdOrHex;
  if (!hex) return INK_DARK;
  return relLuminance(hex) > 0.45 ? INK_DARK : INK_LIGHT;
}

// ── Region value normalization ───────────────────────────────────
// A cell.regions[part] value can be:
//   string                → legacy: just a color ID, pattern defaults to weave.
//   { color, pattern }    → new: explicit color × pattern combination.
//   null / undefined      → blank region.
// All engine code that reads region values goes through these helpers so the
// two forms are interchangeable everywhere.
function regionColor(value) {
  if (!value) return null;
  return typeof value === 'string' ? value : (value.color || null);
}
function regionPattern(value) {
  // null = "solid color, no pattern" (the default for both legacy strings and
  // {color}-only objects). Patterns are explicit, opt-in decoration.
  if (!value || typeof value === 'string') return null;
  return value.pattern || null;
}
function regionKey(value) {
  const c = regionColor(value);
  if (!c) return null;
  const p = regionPattern(value);
  return p ? `${c}:${p}` : c;
}
function patternIdFor(colorId, patternId) {
  return patternId ? `fab-${colorId}-${patternId}` : null;
}

// ── Target validation ────────────────────────────────────────────
function validateTarget(target) {
  const errors = [];
  if (!Array.isArray(target)) { errors.push('target must be an array'); return errors; }
  let size;
  try { size = gridSizeOf(target); }
  catch (e) { errors.push(e.message); return errors; }
  if (!SUPPORTED_SIZES.includes(size)) {
    errors.push(`unsupported grid size ${size}; supported sizes are ${SUPPORTED_SIZES.join(', ')}`);
  }
  for (let i = 0; i < target.length; i++) {
    const cell = target[i];
    if (!cell) { errors.push(`cell ${i}: missing`); continue; }
    if (!SHAPES.includes(cell.shape)) errors.push(`cell ${i}: bad shape '${cell.shape}'`);
    if (typeof cell.rot !== 'number' || cell.rot < 0 || cell.rot >= ROT_COUNT[cell.shape]) {
      errors.push(`cell ${i}: bad rot ${cell.rot} for shape ${cell.shape}`);
    }
    for (const part of partsOf(cell.shape)) {
      const val = cell.regions?.[part];
      const color = regionColor(val);
      if (!color || !FABRICS[color]) {
        errors.push(`cell ${i}: region '${part}' has bad color '${color}'`);
      }
      if (val && typeof val === 'object' && val.pattern && !PATTERNS[val.pattern]) {
        errors.push(`cell ${i}: region '${part}' has bad pattern '${val.pattern}'`);
      }
    }
  }
  return errors;
}

// ── Clue derivation ──────────────────────────────────────────────
function clueForCells(target, cellIndices) {
  const shape = Object.create(null);
  const rotation = Object.create(null);
  const fabric = Object.create(null);
  for (const i of cellIndices) {
    const cell = target[i];
    if (!cell) continue;
    shape[cell.shape] = (shape[cell.shape] || 0) + 1;
    if (cell.rot !== DEFAULT_ROT[cell.shape]) {
      rotation[cell.shape] = (rotation[cell.shape] || 0) + 1;
    }
    for (const part of partsOf(cell.shape)) {
      const fab = regionColor(cell.regions[part]);
      if (fab) fabric[fab] = (fabric[fab] || 0) + 1;
    }
  }
  return { shape, rotation, fabric };
}

function deriveClues(target) {
  const size = gridSizeOf(target);
  const rows = [];
  const cols = [];
  for (let r = 0; r < size; r++) rows.push(clueForCells(target, rowCells(r, size)));
  for (let c = 0; c < size; c++) cols.push(clueForCells(target, colCells(c, size)));
  return { rows, cols, size };
}

// ── Symmetry detection ───────────────────────────────────────────
function isHalfTurnSymmetric(target) {
  const size = gridSizeOf(target);
  const N = size * size;
  for (let i = 0; i < N; i++) {
    const a = target[i];
    const b = target[N - 1 - i];
    if (!a || !b) return false;
    if (a.shape !== b.shape) return false;
    const sym = partnerSymmetry(a.shape, a.rot);
    if (b.rot !== sym.rot) return false;
    for (const part of partsOf(a.shape)) {
      const partnerPart = sym.swap ? (part === 'A' ? 'B' : part === 'B' ? 'A' : part) : part;
      // Compare normalized (color:pattern) keys so visual symmetry holds
      // for both legacy string regions and new {color,pattern} regions.
      if (regionKey(a.regions[part]) !== regionKey(b.regions[partnerPart])) return false;
    }
  }
  return true;
}

// ── Density check ────────────────────────────────────────────────
function maxBandChips(clues) {
  let worst = 0;
  const bands = [...clues.rows, ...clues.cols];
  for (const b of bands) {
    const shapeChips = Object.keys(b.shape).length;
    const fabricChips = Object.keys(b.fabric).length;
    worst = Math.max(worst, shapeChips, fabricChips);
  }
  return worst;
}

// ── Difficulty suggestion ───────────────────────────────────────
// Heuristic: bigger grid, more shapes, more fabrics, more rotations push
// difficulty up; more givens (from the generator) pull it back down. Returns
// one of 'mon-tue' | 'wed-th' | 'fri-sat' | 'sun'. Author can override.
const DIFFICULTIES = ['mon-tue', 'wed-th', 'fri-sat', 'sun'];

function suggestedDifficulty(target, generated) {
  const size = gridSizeOf(target);
  const shapes = new Set();
  const fabrics = new Set();
  let rotated = 0;
  for (const c of target) {
    if (!c) continue;
    shapes.add(c.shape);
    for (const val of Object.values(c.regions || {})) {
      const color = regionColor(val);
      if (color) fabrics.add(color);
    }
    if (c.rot !== 0) rotated++;
  }
  const givens = generated?.givenCount ?? 0;
  let score = 0;
  score += (size - 3) * 8;
  score += (shapes.size - 1) * 20;
  score += Math.max(0, fabrics.size - 2) * 8;
  score += Math.min(rotated, 12) * 4;
  score -= givens * 1;
  if (score < 14) return 'mon-tue';
  if (score < 30) return 'wed-th';
  if (score < 50) return 'fri-sat';
  return 'sun';
}

// ── Exports ──────────────────────────────────────────────────────
const PicrossEngine = {
  DIRS, SUPPORTED_SIZES,
  SHAPES, DEFAULT_ROT, ROT_COUNT,
  CURVE_PORTS, TRIANGLE_FACES,
  FABRICS,
  PATTERNS, DEFAULT_PATTERN,
  INK_DARK, INK_LIGHT,
  relLuminance, inkFor,
  regionColor, regionPattern, regionKey, patternIdFor,
  gridSizeOf,
  rowOf, colOf, rowCells, colCells, partnerOf,
  partsOf,
  partnerSymmetry,
  validateTarget,
  clueForCells, deriveClues,
  isHalfTurnSymmetric,
  maxBandChips,
  suggestedDifficulty, DIFFICULTIES,
};

if (typeof module !== 'undefined' && module.exports) module.exports = PicrossEngine;
if (typeof window !== 'undefined') window.PicrossEngine = PicrossEngine;

})();
</script>
<script>
function bootAdmin() {
  'use strict';
  const E = window.PicrossEngine;
  if (!E) return setTimeout(bootAdmin, 30);

  // Relative URL — relies on this page being served by the library server
  // (npm run picross-library), which serves the API at /library and static
  // files for everything else. Loading this page via file:// will not work.
  const LIBRARY_URL = '/library';
  const FABRICS = E.FABRICS;
  const PATTERNS = E.PATTERNS;

  // ── Fabric pattern injection ─────────────────────────────────
  const _patternCache = new Set();
  function ensurePattern(colorId, patternId) {
    if (!colorId || !patternId) return null;
    const id = E.patternIdFor(colorId, patternId);
    if (!id) return null;
    if (_patternCache.has(id)) return id;
    const color = FABRICS[colorId];
    const pat = PATTERNS[patternId];
    if (!color || !pat) return null;
    const ink = E.inkFor(colorId);
    const defs = document.querySelector('#fabric-defs defs');
    const el = document.createElementNS('http://www.w3.org/2000/svg', 'pattern');
    el.setAttribute('id', id);
    el.setAttribute('patternUnits', 'userSpaceOnUse');
    el.setAttribute('width', pat.tile);
    el.setAttribute('height', pat.tile);
    el.innerHTML = pat.render(color.col, ink);
    defs.appendChild(el);
    _patternCache.add(id);
    return id;
  }
  function fabricFill(value, blank) {
    const color = E.regionColor(value);
    if (!color) return blank || 'var(--cell-empty)';
    const pattern = E.regionPattern(value);
    if (!pattern) return FABRICS[color].col;
    const id = ensurePattern(color, pattern);
    return id ? `url(#${id})` : FABRICS[color].col;
  }
  const state = {
    view: 'schedule',
    library: null,
    filter: 'all',
    today: todayET(),
  };

  function todayET() {
    return new Intl.DateTimeFormat('en-CA', {
      timeZone: 'America/New_York',
      year: 'numeric', month: '2-digit', day: '2-digit',
    }).format(new Date());
  }

  function addDays(iso, n) {
    const [y, m, d] = iso.split('-').map(Number);
    const dt = new Date(Date.UTC(y, m - 1, d));
    dt.setUTCDate(dt.getUTCDate() + n);
    return dt.toISOString().slice(0, 10);
  }

  function dayOfWeek(iso) {
    const [y, m, d] = iso.split('-').map(Number);
    return new Date(Date.UTC(y, m - 1, d)).getUTCDay(); // 0=Sun..6=Sat
  }

  function shortDate(iso) {
    const [y, m, d] = iso.split('-').map(Number);
    const dt = new Date(Date.UTC(y, m - 1, d));
    return dt.toLocaleDateString(undefined, { month: 'short', day: 'numeric', timeZone: 'UTC' });
  }
  function dowLabel(iso) {
    return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dayOfWeek(iso)];
  }

  // Thumbnail SVG for a target (mini-board, no clues).
  function thumbSvg(target) {
    const size = Math.round(Math.sqrt(target.length));
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', `0 0 ${size * 20} ${size * 20}`);
    svg.setAttribute('class', 'ttc');
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
    const fab = value => fabricFill(value);
    for (let i = 0; i < target.length; i++) {
      const r = Math.floor(i / size), c = i % size;
      const x = c * 20, y = r * 20;
      const p = target[i];
      const g = document.createElementNS(ns, 'g');
      g.setAttribute('transform', `translate(${x} ${y}) rotate(${(p.rot || 0) * 90} 10 10)`);
      if (p.shape === 'square') {
        const rect = document.createElementNS(ns, 'rect');
        rect.setAttribute('width', '20'); rect.setAttribute('height', '20');
        rect.setAttribute('fill', fab(p.regions.W));
        g.appendChild(rect);
      } else if (p.shape === 'triangle') {
        const a = document.createElementNS(ns, 'polygon');
        a.setAttribute('points', '0,0 20,0 20,20');
        a.setAttribute('fill', fab(p.regions.A));
        const b = document.createElementNS(ns, 'polygon');
        b.setAttribute('points', '0,0 20,20 0,20');
        b.setAttribute('fill', fab(p.regions.B));
        g.appendChild(a); g.appendChild(b);
      } else if (p.shape === 'bar') {
        const a = document.createElementNS(ns, 'rect');
        a.setAttribute('x', '0'); a.setAttribute('y', '0');
        a.setAttribute('width', '20'); a.setAttribute('height', '10');
        a.setAttribute('fill', fab(p.regions.A));
        const b = document.createElementNS(ns, 'rect');
        b.setAttribute('x', '0'); b.setAttribute('y', '10');
        b.setAttribute('width', '20'); b.setAttribute('height', '10');
        b.setAttribute('fill', fab(p.regions.B));
        g.appendChild(a); g.appendChild(b);
      } else if (p.shape === 'qst') {
        for (const [pts, part] of [
          ['0,0 20,0 10,10', 'A'],
          ['0,20 20,20 10,10', 'A'],
          ['0,0 10,10 0,20', 'B'],
          ['20,0 20,20 10,10', 'B'],
        ]) {
          const poly = document.createElementNS(ns, 'polygon');
          poly.setAttribute('points', pts);
          poly.setAttribute('fill', fab(p.regions[part]));
          g.appendChild(poly);
        }
      } else {
        const field = document.createElementNS(ns, 'rect');
        field.setAttribute('width', '20'); field.setAttribute('height', '20');
        field.setAttribute('fill', fab(p.regions.B));
        const disc = document.createElementNS(ns, 'path');
        disc.setAttribute('d', 'M 0 0 L 20 0 A 20 20 0 0 0 0 20 Z');
        disc.setAttribute('fill', fab(p.regions.A));
        g.appendChild(field); g.appendChild(disc);
      }
      svg.appendChild(g);
    }
    return svg;
  }

  // ── Data fetch ──────────────────────────────────────────────
  async function loadLibrary() {
    try {
      const res = await fetch(LIBRARY_URL);
      state.library = await res.json();
    } catch (e) {
      state.library = { error: 'Library server unreachable — run `npm run picross-library`.' };
    }
    render();
  }

  async function deleteDesign(id) {
    if (!confirm(`Delete "${id}"?`)) return;
    try {
      await fetch(`${LIBRARY_URL}/${encodeURIComponent(id)}`, { method: 'DELETE' });
      loadLibrary();
    } catch (e) { alert('Delete failed: ' + e.message); }
  }

  // ── Render ──────────────────────────────────────────────────
  function render() {
    renderStatus();
    renderBacklogTabBadge();
    if      (state.view === 'schedule') renderSchedule();
    else if (state.view === 'backlog')  renderBacklog();
    else                                 renderLibrary();
  }

  function renderBacklogTabBadge() {
    const tab = document.getElementById('backlogTab');
    if (!tab || !state.library?.designs) { if (tab) tab.textContent = 'Backlog'; return; }
    const n = state.library.designs.filter(d => !d.date).length;
    tab.textContent = n > 0 ? `Backlog (${n})` : 'Backlog';
  }

  function renderStatus() {
    const bar = document.getElementById('statusBar');
    bar.innerHTML = '';
    if (!state.library) {
      bar.innerHTML = `<div class="stat-tile"><span class="lbl">Library</span><span class="val">…</span><span class="sub">loading</span></div>`;
      return;
    }
    if (state.library.error) {
      bar.innerHTML = `<div class="stat-tile warn"><span class="lbl">Library</span><span class="val">!</span><span class="sub">${state.library.error}</span></div>`;
      return;
    }
    const designs = state.library.designs;
    const futureDates = designs.map(d => d.date).filter(dt => dt >= state.today).sort();
    const latest = futureDates[futureDates.length - 1];
    const upcoming14 = [];
    for (let i = 0; i < 14; i++) upcoming14.push(addDays(state.today, i));
    const missing = upcoming14.filter(dt => !designs.find(d => d.date === dt));
    const backlogCount = designs.filter(d => !d.date).length;
    bar.innerHTML = `
      <div class="stat-tile"><span class="lbl">Designs</span><span class="val">${designs.length}</span><span class="sub">in library</span></div>
      <div class="stat-tile"><span class="lbl">Scheduled</span><span class="val">${futureDates.length}</span><span class="sub">today onward</span></div>
      <div class="stat-tile"><span class="lbl">Latest</span><span class="val">${latest ? latest.slice(5) : '—'}</span><span class="sub">${latest ? latest : 'nothing scheduled'}</span></div>
      <div class="stat-tile${missing.length ? ' warn' : ''}"><span class="lbl">Gaps (14d)</span><span class="val">${missing.length}</span><span class="sub">${missing.length ? 'fix in backlog' : 'all covered'}</span></div>
      <div class="stat-tile"><span class="lbl">Backlog</span><span class="val">${backlogCount}</span><span class="sub">unscheduled</span></div>
    `;
  }

  // Move a design's date (assign, change, or clear). Empty string sends to backlog.
  async function moveDesign(design, newDate, errEl) {
    const payload = {
      id: design.id,
      name: design.name,
      author: design.author,
      difficulty: design.difficulty,
      notes: design.notes || '',
      date: newDate,
      target: design.target,
    };
    try {
      const res = await fetch(LIBRARY_URL, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const body = await res.json();
      if (!res.ok) {
        if (errEl) { errEl.textContent = body.error || `Save failed (${res.status})`; errEl.style.display = ''; }
        return false;
      }
      loadLibrary();
      return true;
    } catch (e) {
      if (errEl) { errEl.textContent = 'Server unreachable.'; errEl.style.display = ''; }
      return false;
    }
  }

  // At most one popover open at a time.
  let openPopover = null;
  function closeBacklogPopover() {
    if (openPopover) {
      openPopover.remove();
      openPopover = null;
      document.removeEventListener('click', popoverOutsideClick, true);
      document.removeEventListener('keydown', popoverEscape, true);
    }
  }
  function popoverOutsideClick(e) {
    if (openPopover && !openPopover.contains(e.target) && !e.target.closest('[data-action="from-backlog"]')) {
      closeBacklogPopover();
    }
  }
  function popoverEscape(e) { if (e.key === 'Escape') closeBacklogPopover(); }

  function openBacklogPopover(anchor, iso) {
    closeBacklogPopover();
    const backlog = (state.library?.designs || []).filter(d => !d.date);
    const pop = document.createElement('div');
    pop.className = 'backlog-pop';
    if (backlog.length === 0) {
      pop.innerHTML = '<div class="pop-empty">Backlog is empty.</div>';
    } else {
      for (const d of backlog) {
        const row = document.createElement('div'); row.className = 'pop-row';
        const thumb = document.createElement('div'); thumb.className = 'pop-thumb';
        thumb.appendChild(thumbSvg(d.target));
        const txt = document.createElement('div');
        txt.innerHTML = `<div class="pop-name"></div><div class="pop-meta"></div>`;
        txt.querySelector('.pop-name').textContent = d.name;
        txt.querySelector('.pop-meta').textContent = `${d.author || 'unknown'} · ${d.difficulty}`;
        row.appendChild(thumb); row.appendChild(txt);
        row.addEventListener('click', async () => {
          await moveDesign(d, iso, null);
          closeBacklogPopover();
        });
        pop.appendChild(row);
      }
    }
    anchor.appendChild(pop);
    openPopover = pop;
    // Defer listener install so the click that opened us doesn't immediately close us.
    setTimeout(() => {
      document.addEventListener('click', popoverOutsideClick, true);
      document.addEventListener('keydown', popoverEscape, true);
    }, 0);
  }

  // mode: 'schedule' | 'library' | 'backlog'.
  // For 'schedule', iso is the day of the strip; design may be null (empty day).
  // For 'library', iso === design.date (or '' for backlog entries surfaced here, which we don't do today).
  // For 'backlog', iso is '' and design is the backlog design.
  function dayCard(iso, design, mode = 'schedule') {
    const card = document.createElement('div');
    card.className = 'day';
    if (mode === 'schedule') {
      if (iso === state.today) card.classList.add('today');
      if (iso < state.today)   card.classList.add('past');
      if (!design)             card.classList.add('empty');
    }
    if (mode === 'backlog') card.classList.add('backlog');

    if (mode !== 'backlog') {
      const dowEl = document.createElement('div');
      dowEl.className = 'day-label'; dowEl.textContent = dowLabel(iso);
      const dateEl = document.createElement('div');
      dateEl.className = 'day-date'; dateEl.textContent = shortDate(iso);
      card.appendChild(dowEl); card.appendChild(dateEl);
    } else {
      const lbl = document.createElement('div');
      lbl.className = 'day-label'; lbl.textContent = 'Backlog';
      card.appendChild(lbl);
    }

    if (design) {
      const thumb = document.createElement('div'); thumb.className = 'day-thumb';
      thumb.appendChild(thumbSvg(design.target));
      card.appendChild(thumb);
      const name = document.createElement('div');
      name.className = 'day-name'; name.textContent = design.name;
      card.appendChild(name);
      const author = document.createElement('div');
      author.className = 'day-author'; author.textContent = design.author || 'unknown';
      card.appendChild(author);
      const diff = document.createElement('div');
      diff.className = 'day-diff'; diff.textContent = design.difficulty;
      card.appendChild(diff);

      const actions = document.createElement('div');
      actions.className = 'day-actions';
      if (design.date) {
        actions.innerHTML = `
          <a href="./sampler-picross.html#${design.date}" target="_blank">play</a>
          <a href="./sampler-picross-author.html?edit=${design.id}">edit</a>
          <a href="#" data-action="unschedule">→ backlog</a>
          <a href="#" data-action="delete">delete</a>
        `;
      } else {
        // Backlog card.
        actions.innerHTML = `
          <input type="date" data-action="set-date" class="set-date" />
          <a href="./sampler-picross-author.html?edit=${design.id}">edit</a>
          <a href="#" data-action="delete">delete</a>
        `;
      }
      card.appendChild(actions);
      const errEl = document.createElement('div');
      errEl.className = 'day-err'; errEl.style.display = 'none';
      card.appendChild(errEl);

      actions.querySelector('[data-action="delete"]').addEventListener('click', (e) => {
        e.preventDefault(); deleteDesign(design.id);
      });
      const unsched = actions.querySelector('[data-action="unschedule"]');
      if (unsched) unsched.addEventListener('click', async (e) => {
        e.preventDefault();
        await moveDesign(design, '', errEl);
      });
      const setDate = actions.querySelector('[data-action="set-date"]');
      if (setDate) setDate.addEventListener('change', async (e) => {
        const ok = await moveDesign(design, e.target.value, errEl);
        if (!ok) e.target.value = '';
      });
    } else {
      // Empty schedule day.
      const filler = document.createElement('div');
      filler.style.flex = '1';
      card.appendChild(filler);
      const actions = document.createElement('div');
      actions.className = 'day-actions';
      const backlogCount = (state.library?.designs || []).filter(d => !d.date).length;
      if (backlogCount > 0) {
        const from = document.createElement('a');
        from.href = '#';
        from.className = 'from-backlog';
        from.dataset.action = 'from-backlog';
        from.textContent = `↓ from backlog (${backlogCount})`;
        from.addEventListener('click', (e) => {
          e.preventDefault(); e.stopPropagation();
          openBacklogPopover(card, iso);
        });
        actions.appendChild(from);
      }
      const add = document.createElement('a');
      add.href = `./sampler-picross-author.html?date=${iso}`;
      add.className = 'add';
      add.textContent = '+ add';
      actions.appendChild(add);
      card.appendChild(actions);
    }
    return card;
  }

  function renderSchedule() {
    const body = document.getElementById('viewBody');
    body.innerHTML = '';
    if (state.library?.error) { body.innerHTML = '<div class="empty-msg">' + state.library.error + '</div>'; return; }
    if (!state.library) return;
    const designs = state.library.designs;
    const grid = document.createElement('div'); grid.className = 'schedule';
    // 28-day strip starting today.
    for (let i = 0; i < 28; i++) {
      const iso = addDays(state.today, i);
      const design = designs.find(d => d.date === iso) || null;
      grid.appendChild(dayCard(iso, design));
    }
    body.appendChild(grid);
  }

  function renderLibrary() {
    const body = document.getElementById('viewBody');
    body.innerHTML = '';
    if (state.library?.error) { body.innerHTML = '<div class="empty-msg">' + state.library.error + '</div>'; return; }
    if (!state.library) return;
    const designs = state.library.designs;
    const filterRow = document.createElement('div'); filterRow.className = 'lib-filter';
    filterRow.innerHTML = `
      <span class="day-label">Filter:</span>
      <select id="filterSel">
        <option value="all">All</option>
        <option value="mon-tue">Mon-Tue</option>
        <option value="wed-th">Wed-Th</option>
        <option value="fri-sat">Fri-Sat</option>
        <option value="sun">Sun</option>
      </select>
    `;
    body.appendChild(filterRow);
    filterRow.querySelector('#filterSel').value = state.filter;
    filterRow.querySelector('#filterSel').addEventListener('change', (e) => {
      state.filter = e.target.value; renderLibrary();
    });
    const grid = document.createElement('div'); grid.className = 'library';
    const filtered = designs
      .filter(d => d.date !== '')
      .filter(d => state.filter === 'all' || d.difficulty === state.filter)
      .slice()
      .sort((a, b) => a.date.localeCompare(b.date));
    if (filtered.length === 0) {
      body.appendChild(Object.assign(document.createElement('div'), {
        className: 'empty-msg',
        textContent: 'No designs yet. Use ✎ new design to create one.',
      }));
      return;
    }
    for (const d of filtered) grid.appendChild(dayCard(d.date, d));
    body.appendChild(grid);
  }

  function renderBacklog() {
    const body = document.getElementById('viewBody');
    body.innerHTML = '';
    if (state.library?.error) { body.innerHTML = '<div class="empty-msg">' + state.library.error + '</div>'; return; }
    if (!state.library) return;
    const backlog = state.library.designs
      .filter(d => !d.date)
      .slice()
      .sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || '')); // newest first
    if (backlog.length === 0) {
      body.appendChild(Object.assign(document.createElement('div'), {
        className: 'empty-msg',
        textContent: 'No backlog designs. Save one without a date from the author page.',
      }));
      return;
    }
    const grid = document.createElement('div'); grid.className = 'library';
    for (const d of backlog) grid.appendChild(dayCard('', d, 'backlog'));
    body.appendChild(grid);
  }

  // ── Tabs ────────────────────────────────────────────────────
  for (const tab of document.querySelectorAll('.view-tab')) {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t === tab));
      state.view = tab.dataset.view;
      render();
    });
  }

  loadLibrary();
}
bootAdmin();
</script>
